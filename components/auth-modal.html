<!-- Auth Modal Component -->
<div id="auth-modal" class="auth-modal">
  <div class="auth-modal-content">
    <span class="auth-modal-close" id="auth-modal-close">&times;</span>
    <h2 id="auth-modal-title">Вход</h2>
    
    <!-- Форма входа -->
    <form id="login-form" class="auth-form">
      <div class="form-group">
        <label for="login-email">Электронная почта:</label>
        <input type="email" id="login-email" name="email" required>
      </div>
      <div class="form-group">
        <label for="login-password">Пароль:</label>
        <input type="password" id="login-password" name="password" required>
      </div>
      <button type="submit" class="btn-primary">Войти</button>
      <div class="auth-switch">
        Нет аккаунта? <a href="#" id="show-register">Зарегистрироваться</a>
      </div>
    </form>

    <!-- Форма регистрации -->
    <form id="register-form" class="auth-form" style="display: none;">
      <div class="form-group">
        <label for="register-email">Электронная почта:</label>
        <input type="email" id="register-email" name="email" required>
      </div>
      <div class="form-group">
        <label for="register-password">Пароль:</label>
        <input type="password" id="register-password" name="password" required minlength="6">
      </div>
      <div class="form-group">
        <label for="register-fullname">Полное имя:</label>
        <input type="text" id="register-fullname" name="fullname">
      </div>
      <div class="form-group">
        <label for="register-phone">Телефон:</label>
        <input type="tel" id="register-phone" name="phone">
      </div>
      <button type="submit" class="btn-primary">Зарегистрироваться</button>
      <div class="auth-switch">
        Уже есть аккаунт? <a href="#" id="show-login">Войти</a>
      </div>
    </form>
  </div>
</div>

<script>
// Обработчики переключения между формами
document.getElementById('show-register').addEventListener('click', (e) => {
  e.preventDefault()
  authManager.showAuthModal('register')
})

document.getElementById('show-login').addEventListener('click', (e) => {
  e.preventDefault()
  authManager.showAuthModal('login')
})

// Закрытие модального окна
document.getElementById('auth-modal-close').addEventListener('click', () => {
  authManager.hideAuthModal()
})

// Закрытие модального окна при клике вне контента
document.getElementById('auth-modal').addEventListener('click', (e) => {
  if (e.target.id === 'auth-modal') {
    authManager.hideAuthModal()
  }
})

// Закрытие модального окна по Esc
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    authManager.hideAuthModal()
  }
})
</script>
